name: Build Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: ImageOptimPro-Linux
            path: build/linux
          - os: windows-latest
            target: windows
            artifact: ImageOptimPro-Windows
            path: build/windows
          - os: macos-latest
            target: macos
            artifact: ImageOptimPro-macOS
            path: build/macos/ImageOptimPro.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet==0.85.2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build
        env:
          PYTHONUTF8: "1"
        run: flet build ${{ matrix.target }} --project ImageOptimPro --module-name image_resizer

      - name: List build output (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: find build -maxdepth 6 -name "*.exe" 2>/dev/null | head -20 || echo "Nothing found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create ZIP archives
        run: |
          zip -r ImageOptimPro-Linux.zip ImageOptimPro-Linux/
          zip -r ImageOptimPro-Windows.zip ImageOptimPro-Windows/
          zip -r ImageOptimPro-macOS.zip ImageOptimPro-macOS/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ImageOptimPro-Linux.zip
            ImageOptimPro-Windows.zip
            ImageOptimPro-macOS.zip
          generate_release_notes: true
